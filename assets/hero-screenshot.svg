<!--
  PLACEHOLDER hero screenshot — calm "Reading" view.
  Replace with a real app screenshot at assets/hero-screenshot.png (phone ratio ~9:19.5, e.g. 1170x2532).
  If you change the extension, update the <img src> in index.html.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780" role="img" aria-label="FluentFable reading screen: a Korean short story with one word tapped for an inline definition">
  <defs><clipPath id="hero"><rect width="360" height="780" rx="30"/></clipPath></defs>
  <g clip-path="url(#hero)">
    <rect width="360" height="780" fill="#fbf9f8"/>
    <!-- header -->
    <text x="28" y="56" fill="#9a9c9f" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">CURRENT READING</text>
    <text x="28" y="84" fill="#1b1c1c" font-family="Fraunces, Georgia, serif" font-size="24" font-weight="500">감자</text>
    <text x="318" y="84" fill="#75777b" font-family="Inter, sans-serif" font-size="13" text-anchor="end">7%</text>
    <rect x="28" y="100" width="304" height="4" rx="2" fill="#eceaea"/>
    <rect x="28" y="100" width="22" height="4" rx="2" fill="#202631"/>
    <line x1="28" y1="128" x2="332" y2="128" stroke="#e4e2e2" stroke-width="1"/>
    <!-- prose -->
    <g font-family="Noto Serif KR, Fraunces, serif" font-size="18" fill="#1b1c1c">
      <text x="28" y="176">싸움, 간통, 살인, 도둑,</text>
      <text x="28" y="210">구걸, 정성, 이 칠성문 밖</text>
      <text x="28" y="244">빈민굴의 일상이었다.</text>
      <text x="28" y="290">복녀는 원래 가난하나마</text>
      <text x="28" y="324">정직한 농가에서 자라난</text>
    </g>
    <!-- tapped word -->
    <rect x="26" y="338" width="66" height="28" rx="6" fill="rgba(32,38,49,0.10)"/>
    <text x="28" y="360" font-family="Noto Serif KR, Fraunces, serif" font-size="18" fill="#1b1c1c">처녀였다.</text>
    <!-- inline definition popover -->
    <rect x="28" y="384" width="304" height="120" rx="12" fill="#ffffff" stroke="#e4e2e2" stroke-width="1"/>
    <text x="44" y="420" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="22" font-weight="500">처녀</text>
    <text x="92" y="420" fill="#9a9c9f" font-family="Inter, sans-serif" font-size="13">cheo-nyeo · noun</text>
    <text x="44" y="450" fill="#44474b" font-family="Inter, sans-serif" font-size="14">an unmarried young woman; a maiden</text>
    <rect x="44" y="466" width="118" height="26" rx="13" fill="#f4f1f1"/>
    <text x="60" y="484" fill="#5c5e63" font-family="Noto Serif KR, serif" font-size="12">處女 · roots</text>
    <text x="312" y="484" fill="#202631" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="end">+ Add</text>
    <!-- more prose continues, faded -->
    <g font-family="Noto Serif KR, Fraunces, serif" font-size="18" fill="#1b1c1c" opacity="0.9">
      <text x="28" y="552">그러나 그의 집안이</text>
      <text x="28" y="586">가난해지면서 차차</text>
    </g>
    <g font-family="Noto Serif KR, Fraunces, serif" font-size="18" fill="#1b1c1c" opacity="0.45">
      <text x="28" y="620">모든 것이 달라지기</text>
      <text x="28" y="654">시작하였다.</text>
    </g>
    <!-- bottom reading bar -->
    <line x1="0" y1="712" x2="360" y2="712" stroke="#eceaea" stroke-width="1"/>
    <circle cx="48" cy="748" r="5" fill="#202631"/>
    <text x="180" y="752" fill="#75777b" font-family="Inter, sans-serif" font-size="12" text-anchor="middle">3 new words this page</text>
    <circle cx="312" cy="748" r="5" fill="#c5c6cb"/>
  </g>
  <rect x="0.5" y="0.5" width="359" height="779" rx="30" fill="none" stroke="#e4e2e2" stroke-width="1"/>
</svg>
