<!--
  PLACEHOLDER Open Graph / social share image (1200x630).
  Replace with assets/og-image.png for best cross-platform support (some platforms ignore SVG OG images).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="FluentFable — learn Korean by reading">
  <rect width="1200" height="630" fill="#fbf9f8"/>
  <!-- monogram -->
  <rect x="80" y="80" width="92" height="92" rx="20" fill="#202631"/>
  <text x="126" y="132" fill="#faf8f5" font-family="Fraunces, Georgia, serif" font-size="46" font-weight="600" text-anchor="middle" dominant-baseline="central">FF</text>
  <text x="196" y="142" fill="#1b1c1c" font-family="Fraunces, Georgia, serif" font-size="40" font-weight="500">FluentFable</text>
  <text x="80" y="320" fill="#1b1c1c" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="500">Learn Korean the way</text>
  <text x="80" y="400" fill="#1b1c1c" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="500">you learned to read.</text>
  <text x="80" y="470" fill="#5c5e63" font-family="Inter, sans-serif" font-size="28">Reading-first. Tap any word. No streaks, no owl.</text>
  <!-- book cover motif -->
  <rect x="980" y="120" width="200" height="0" />
  <g transform="translate(940,150)">
    <rect x="0" y="0" width="180" height="252" rx="10" fill="#353c47"/>
    <line x1="20" y1="30" x2="160" y2="30" stroke="#faf8f5" stroke-opacity="0.45"/>
    <line x1="20" y1="222" x2="160" y2="222" stroke="#faf8f5" stroke-opacity="0.45"/>
    <text x="90" y="148" fill="#faf8f5" font-family="Noto Serif KR, Fraunces, serif" font-size="40" font-weight="500" text-anchor="middle">감자</text>
  </g>
</svg>
