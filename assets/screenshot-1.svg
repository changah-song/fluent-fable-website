<!--
  PLACEHOLDER screenshot — "Reading" screen.
  Replace with a real app screenshot at assets/screenshot-1.png (phone ratio ~9:19.5, e.g. 1170x2532).
  Update the <img src> in index.html if you change the extension.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780" role="img" aria-label="FluentFable reading screen with Korean text and a tapped word definition">
  <defs>
    <clipPath id="ph1-screen"><rect x="0" y="0" width="360" height="780" rx="28"/></clipPath>
  </defs>
  <g clip-path="url(#ph1-screen)">
    <rect width="360" height="780" fill="#fbf9f8"/>
    <!-- top bar -->
    <text x="24" y="48" fill="#9a9c9f" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">CURRENT READING</text>
    <text x="24" y="76" fill="#1b1c1c" font-family="Fraunces, Georgia, serif" font-size="22" font-weight="500">감자</text>
    <text x="24" y="98" fill="#75777b" font-family="Inter, system-ui, sans-serif" font-size="13">김동인</text>
    <!-- progress bar -->
    <rect x="24" y="116" width="312" height="4" rx="2" fill="#eceaea"/>
    <rect x="24" y="116" width="78" height="4" rx="2" fill="#202631"/>
    <line x1="24" y1="140" x2="336" y2="140" stroke="#e4e2e2" stroke-width="1"/>
    <!-- body text lines (Korean serif feel via blocks + a couple real glyphs) -->
    <text x="24" y="186" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="17" letter-spacing="0.2">싸움, 간통, 살인, 도둑,</text>
    <text x="24" y="216" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="17">구걸, 정성 — 이 칠성문 밖</text>
    <text x="24" y="246" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="17">빈민굴의 일상이었다.</text>
    <!-- highlighted (tapped) word -->
    <rect x="22" y="262" width="64" height="26" rx="6" fill="rgba(32,38,49,0.10)"/>
    <text x="24" y="282" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="17">복녀는</text>
    <text x="92" y="282" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="17">원래 가난하나마</text>
    <text x="24" y="312" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="17">정직한 농가에서 자라난</text>
    <text x="24" y="342" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="17">처녀였다.</text>
    <!-- definition sheet -->
    <rect x="0" y="470" width="360" height="310" fill="#ffffff"/>
    <line x1="0" y1="470" x2="360" y2="470" stroke="#e4e2e2" stroke-width="1"/>
    <rect x="160" y="486" width="40" height="4" rx="2" fill="#e4e2e2"/>
    <text x="24" y="540" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="30" font-weight="500">복녀</text>
    <text x="24" y="568" fill="#75777b" font-family="Inter, system-ui, sans-serif" font-size="14">bok-nyeo · proper noun</text>
    <line x1="24" y1="588" x2="336" y2="588" stroke="#eceaea" stroke-width="1"/>
    <text x="24" y="620" fill="#44474b" font-family="Inter, system-ui, sans-serif" font-size="15">Bongnyeo — the name of the</text>
    <text x="24" y="642" fill="#44474b" font-family="Inter, system-ui, sans-serif" font-size="15">story's protagonist.</text>
    <!-- hanja chip -->
    <rect x="24" y="666" width="120" height="30" rx="15" fill="#f4f1f1"/>
    <text x="40" y="686" fill="#5c5e63" font-family="Noto Serif KR, serif" font-size="14">福 福 · roots</text>
    <!-- add to deck button -->
    <rect x="24" y="716" width="312" height="44" rx="22" fill="#202631"/>
    <text x="180" y="744" fill="#faf8f5" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Add to review deck</text>
  </g>
  <rect x="0.5" y="0.5" width="359" height="779" rx="28" fill="none" stroke="#e4e2e2" stroke-width="1"/>
</svg>
