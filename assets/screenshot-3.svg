<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780" role="img" aria-label="FluentFable spaced-repetition review card">
  <defs><clipPath id="ph3"><rect width="360" height="780" rx="28"/></clipPath></defs>
  <g clip-path="url(#ph3)">
    <rect width="360" height="780" fill="#f0eded"/>
    <text x="24" y="56" fill="#75777b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">REVIEW · 6 DUE</text>
    <text x="24" y="86" fill="#1b1c1c" font-family="Fraunces, Georgia, serif" font-size="26" font-weight="500">Words you met</text>
    <!-- card -->
    <rect x="24" y="120" width="312" height="380" rx="16" fill="#fefdfc" stroke="#e4e2e2" stroke-width="1"/>
    <text x="180" y="250" fill="#1b1c1c" font-family="Noto Serif KR, Fraunces, serif" font-size="56" font-weight="500" text-anchor="middle">정직</text>
    <text x="180" y="292" fill="#9a9c9f" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">jeong-jik</text>
    <line x1="60" y1="330" x2="300" y2="330" stroke="#eceaea" stroke-width="1"/>
    <text x="180" y="372" fill="#44474b" font-family="Inter, sans-serif" font-size="17" text-anchor="middle">honesty; integrity</text>
    <text x="180" y="430" fill="#75777b" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">From 감자 · seen 3 times</text>
    <!-- grade buttons -->
    <rect x="24" y="540" width="96" height="48" rx="24" fill="none" stroke="#c5c6cb" stroke-width="1"/>
    <text x="72" y="570" fill="#1b1c1c" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Again</text>
    <rect x="132" y="540" width="96" height="48" rx="24" fill="none" stroke="#c5c6cb" stroke-width="1"/>
    <text x="180" y="570" fill="#1b1c1c" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Good</text>
    <rect x="240" y="540" width="96" height="48" rx="24" fill="#202631"/>
    <text x="288" y="570" fill="#faf8f5" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Easy</text>
    <!-- footer note -->
    <text x="180" y="636" fill="#9a9c9f" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">Scheduled by FSRS — only when</text>
    <text x="180" y="656" fill="#9a9c9f" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">a word is about to slip.</text>
  </g>
  <rect x="0.5" y="0.5" width="359" height="779" rx="28" fill="none" stroke="#e4e2e2" stroke-width="1"/>
</svg>
