<!--
  PLACEHOLDER video poster — shown before the demo video plays.
  Replace with assets/demo-poster.png (landscape, ~16:9 e.g. 1600x900) and supply assets/demo.mp4.
  Then uncomment the <video> tag in index.html.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="FluentFable demo video — coming soon">
  <rect width="1600" height="900" fill="#202631"/>
  <line x1="160" y1="120" x2="1440" y2="120" stroke="#faf8f5" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="160" y1="780" x2="1440" y2="780" stroke="#faf8f5" stroke-opacity="0.25" stroke-width="1"/>
  <text x="800" y="380" fill="#faf8f5" font-family="Inter, sans-serif" font-size="22" font-weight="700" letter-spacing="3" text-anchor="middle">FLUENTFABLE</text>
  <text x="800" y="470" fill="#faf8f5" font-family="Fraunces, Georgia, serif" font-size="56" font-weight="500" text-anchor="middle">See it in action</text>
  <text x="800" y="520" fill="#faf8f5" fill-opacity="0.6" font-family="Inter, sans-serif" font-size="20" text-anchor="middle">Demo video — replace assets/demo-poster.png + demo.mp4</text>
  <!-- play glyph -->
  <circle cx="800" cy="640" r="48" fill="none" stroke="#faf8f5" stroke-opacity="0.7" stroke-width="2"/>
  <path d="M788 616 L788 664 L826 640 Z" fill="#faf8f5"/>
</svg>
